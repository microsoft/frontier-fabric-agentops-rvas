name: Deploy Infrastructure & Run Exports

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "src/scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: production
    outputs:
      storage_account_name: ${{ steps.outputs.outputs.AZURE_STORAGE_ACCOUNT_NAME }}
      workspace_id: ${{ steps.outputs.outputs.AZURE_LOG_ANALYTICS_WORKSPACE_ID }}
      storage_account_id: ${{ steps.outputs.outputs.AZURE_STORAGE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Dev Provision
        run: azd provision --no-prompt
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Capture deployment outputs
        id: outputs
        run: |
          azd env get-values > .env
          while IFS='=' read -r key value; do
            value="${value%\"}"
            value="${value#\"}"
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < .env

  run-exports:
    name: Run Resource Graph Export
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in with Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r src/scripts/requirements.txt

      - name: Run Resource Graph export
        run: |
          python src/scripts/resource_graph_export.py \
            --subscription-id "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --storage-account "${{ needs.deploy-infra.outputs.storage_account_name }}" \
            --container metadata

      - name: Validate exports
        run: |
          python src/scripts/validate_exports.py \
            --storage-account "${{ needs.deploy-infra.outputs.storage_account_name }}"
