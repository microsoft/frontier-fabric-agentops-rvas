name: Scheduled Resource Graph Export

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 2:00 AM UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  export-resource-graph:
    name: Export Resource Graph Data
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in with Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r src/scripts/requirements.txt

      - name: Run Resource Graph export
        run: |
          python src/scripts/resource_graph_export.py \
            --subscription-id "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --storage-account "${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}" \
            --container metadata

      - name: Validate exports
        run: |
          python src/scripts/validate_exports.py \
            --storage-account "${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}"
